<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Diabetes Risk Screening Tool</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="container">
    <h1>Diabetes Risk Screening Tool</h1>
    <p class="subtitle">Answer a few questions to estimate your diabetes risk.</p>

    <form id="riskForm" novalidate>
      <div class="form-group">
        <label for="age">Age (years)</label>
        <input type="number" id="age" name="age" min="1" max="120" placeholder="e.g. 45" required />
      </div>

      <div class="form-group">
        <label for="bmi">BMI (kg/m²)</label>
        <input type="number" id="bmi" name="bmi" min="10" max="70" step="0.1" placeholder="e.g. 27.5" required />
      </div>

      <div class="form-group">
        <label>Do you have hypertension?</label>
        <div class="radio-group">
          <label><input type="radio" name="hypertension" value="true" required /> Yes</label>
          <label><input type="radio" name="hypertension" value="false" /> No</label>
        </div>
      </div>

      <div class="form-group">
        <label>Are you physically active?</label>
        <div class="radio-group">
          <label><input type="radio" name="physicalActivity" value="true" required /> Yes</label>
          <label><input type="radio" name="physicalActivity" value="false" /> No</label>
        </div>
      </div>

      <div class="form-group">
        <label for="sleepHours">Average sleep hours per night</label>
        <input type="number" id="sleepHours" name="sleepHours" min="1" max="24" step="0.5" placeholder="e.g. 7" required />
      </div>

      <button type="submit">Estimate Risk</button>
    </form>

    <div id="result" class="result hidden" aria-live="polite">
      <h2>Your Result</h2>
      <p>Estimated probability: <strong id="probability"></strong></p>
      <p>Risk category: <strong id="riskCategory"></strong></p>
    </div>

    <div id="error" class="error hidden" aria-live="polite"></div>
  </div>

  <script src="app.js"></script>
</body>
</html>
